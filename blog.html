<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Flow Timer Blog — tips on focus, productivity, and deep work.">
  <title>Blog — Flow Timer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="auth.css">
  <style>
    .hero-bg { position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse at 20% 50%,rgba(233,69,96,.06) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(74,144,217,.06) 0%,transparent 60%),#1a1a2e; }
    .blog-hero { max-width:var(--max);margin:0 auto;padding:64px 24px 40px; }
    .blog-hero h1 { font-size:clamp(2rem,5vw,3rem);font-weight:800;margin-bottom:12px; }
    .blog-hero p { color:var(--text-muted);font-size:1.1rem; }
    .posts-grid { max-width:var(--max);margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:28px; }
    .post-card { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column; }
    .post-card:hover { transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.4); }
    .post-cover { width:100%;height:200px;object-fit:cover;background:var(--surface2); }
    .post-cover-placeholder { width:100%;height:200px;background:linear-gradient(135deg,#16213e,#0f3460);display:flex;align-items:center;justify-content:center;font-size:3rem; }
    .post-body { padding:24px;flex:1;display:flex;flex-direction:column; }
    .post-tag { font-size:.7rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px; }
    .post-title { font-size:1.2rem;font-weight:700;margin-bottom:10px;line-height:1.35; }
    .post-title a { color:var(--text);text-decoration:none; }
    .post-title a:hover { color:var(--accent); }
    .post-excerpt { color:var(--text-muted);font-size:.9rem;line-height:1.6;flex:1; }
    .post-meta { display:flex;align-items:center;gap:12px;margin-top:18px;padding-top:16px;border-top:1px solid var(--border);font-size:.8rem;color:var(--text-muted); }
    .empty-state { max-width:var(--max);margin:40px auto;padding:0 24px;text-align:center;color:var(--text-muted); }
    .empty-state p { font-size:1.1rem;margin-top:12px; }
  </style>
</head>
<body>
<div class="hero-bg"></div>

<nav>
  <div class="nav-inner">
    <a href="landing.html" class="nav-logo">⏱ Flow Timer</a>
    <div class="nav-links" id="nav-links">
      <a href="landing.html#features" class="nav-link">Features</a>
      <a href="landing.html#pricing" class="nav-link">Pricing</a>
      <a href="blog.html" class="nav-link" style="color:var(--accent)">Blog</a>
      <a href="login.html" class="btn btn-outline" style="padding:8px 18px;font-size:.85rem;">Log in</a>
      <a href="signup.html" class="btn btn-primary" style="padding:8px 18px;font-size:.85rem;">Start Free Trial</a>
    </div>
  </div>
</nav>

<div class="blog-hero">
  <p class="section-label">The Flow Timer Blog</p>
  <h1>Focus. Flow. <span style="color:var(--accent)">Get things done.</span></h1>
  <p>Tips, guides, and deep dives on productivity, focus, and doing your best work.</p>
</div>

<div class="posts-grid" id="posts-grid">
  <!-- posts rendered here -->
</div>

<div class="empty-state" id="empty-state" style="display:none;">
  <div style="font-size:3rem;">✍️</div>
  <p>No posts yet. Check back soon!</p>
</div>

<footer style="text-align:center;padding:32px 24px;border-top:1px solid var(--border);color:var(--text-muted);font-size:.85rem;">
  © 2026 Flow Timer · <a href="#">Privacy</a> · <a href="#">Terms</a> · <a href="blog.html">Blog</a>
</footer>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-client.js"></script>
<script src="auth.js"></script>
<script>
  // Update nav if logged in
  Auth.init().then(user => {
    if (user) {
      const links = document.getElementById('nav-links');
      links.innerHTML = `
        ${user.avatar ? `<img src="${user.avatar}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">` : ''}
        <span style="font-size:.85rem;color:var(--text-muted)">Hi, ${user.name.split(' ')[0]}</span>
        <a href="blog.html" class="nav-link" style="color:var(--accent)">Blog</a>
        <a href="index.html" class="btn btn-primary" style="padding:8px 18px;font-size:.85rem;">Open App</a>
        ${user.email === 'arpietmalpani@gmail.com' ? '<a href="blog-admin.html" class="btn btn-outline" style="padding:8px 18px;font-size:.85rem;">Admin</a>' : ''}
      `;
    }
  });

  // Load published posts
  async function loadPosts() {
    const { data: posts, error } = await _sb
      .from('blog_posts')
      .select('id,title,slug,excerpt,cover_image,created_at,tag')
      .eq('published', true)
      .order('created_at', { ascending: false });

    const grid = document.getElementById('posts-grid');
    const empty = document.getElementById('empty-state');

    if (error || !posts || posts.length === 0) {
      grid.style.display = 'none';
      empty.style.display = 'block';
      return;
    }

    grid.innerHTML = posts.map(p => `
      <div class="post-card">
        ${p.cover_image
          ? `<img class="post-cover" src="${p.cover_image}" alt="${escHtml(p.title)}" loading="lazy">`
          : `<div class="post-cover-placeholder">📝</div>`}
        <div class="post-body">
          ${p.tag ? `<div class="post-tag">${escHtml(p.tag)}</div>` : ''}
          <div class="post-title"><a href="blog-post.html?slug=${encodeURIComponent(p.slug)}">${escHtml(p.title)}</a></div>
          <div class="post-excerpt">${escHtml(p.excerpt || '')}</div>
          <div class="post-meta">
            <span>🗓 ${fmtDate(p.created_at)}</span>
            <a href="blog-post.html?slug=${encodeURIComponent(p.slug)}" style="margin-left:auto;color:var(--accent);font-weight:600;">Read →</a>
          </div>
        </div>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  }

  loadPosts();
</script>
</body>
</html>
