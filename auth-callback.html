<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signing in...</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eaeaea;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2a2a4a;
      border-top-color: #39ff14; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Signing you in...</p>
  <script>
    // Google sign-in now uses popup — no redirect needed
    // This page just redirects to index if already logged in
    window.location.href = 'index.html';
  </script>
</body>
</html>
