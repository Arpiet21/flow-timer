<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#1a1a2e"/>
  <!-- Stopwatch body -->
  <circle cx="16" cy="19" r="10" fill="none" stroke="white" stroke-width="2"/>
  <!-- Crown / top cap -->
  <rect x="13.8" y="7.5" width="4.4" height="2.2" rx="1" fill="white"/>
  <!-- Button on top -->
  <rect x="15" y="6" width="2" height="2" rx="1" fill="white"/>
  <!-- Left side button -->
  <rect x="9" y="9" width="2.8" height="1.6" rx="0.8" fill="white" transform="rotate(-40 10.4 9.8)"/>
  <!-- Right side button -->
  <rect x="20.2" y="9" width="2.8" height="1.6" rx="0.8" fill="white" transform="rotate(40 21.6 9.8)"/>
  <!-- Minute hand (pointing to ~10 o'clock) -->
  <line x1="16" y1="19" x2="11.5" y2="14.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Second hand (pointing up) -->
  <line x1="16" y1="19" x2="16" y2="12" stroke="#39ff14" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="19" r="1.3" fill="white"/>
</svg>
