<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Stopwatch body -->
  <circle cx="16" cy="18" r="12" fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Crown / top cap -->
  <rect x="13.5" y="4.5" width="5" height="2.5" rx="1" fill="white"/>
  <!-- Button on top -->
  <rect x="14.8" y="3" width="2.4" height="2" rx="1" fill="white"/>
  <!-- Left button -->
  <rect x="8.5" y="6.5" width="3" height="1.8" rx="0.9" fill="white" transform="rotate(-35 10 7.4)"/>
  <!-- Right button -->
  <rect x="20.5" y="6.5" width="3" height="1.8" rx="0.9" fill="white" transform="rotate(35 22 7.4)"/>
  <!-- Clock hand -->
  <line x1="16" y1="18" x2="16" y2="10.5" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="18" x2="21" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="18" r="1.2" fill="white"/>
</svg>
