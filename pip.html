<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=220, initial-scale=1.0">
  <title>Flow Timer</title>
  <link rel="stylesheet" href="css/pip.css">
</head>
<body>
  <span id="pip-mode">Focus</span>
  <canvas id="pip-clock" width="150" height="150"></canvas>
  <span id="pip-time">25:00</span>
  <span id="pip-task" style="font-size:0.65rem;color:#888;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;"></span>
  <div class="pip-controls">
    <button class="pip-btn" id="pip-play" title="Play/Pause">▶</button>
    <button class="pip-btn" id="pip-reset" title="Reset">↺</button>
  </div>
</body>
</html>
