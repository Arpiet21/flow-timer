<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Flow Timer</title>
  <link rel="stylesheet" href="auth.css">
  <style>
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--text-muted); font-size: 0.82rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .btn-google {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg);
      color: var(--text); font-size: 0.95rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px; transition: border-color 0.2s, background 0.2s;
    }
    .btn-google:hover { border-color: #4285f4; background: rgba(66,133,244,0.06); }
    .btn-google img { width: 18px; height: 18px; }
    .success-msg {
      display: none; background: rgba(15,155,142,0.12);
      border: 1px solid rgba(15,155,142,0.3); border-radius: 8px;
      padding: 10px 14px; font-size: 0.85rem; color: #0f9b8e; margin-bottom: 16px;
    }
    .success-msg.show { display: block; }
  </style>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">⏱ Flow Timer</div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Free forever · No credit card required</p>

    <!-- Google Signup -->
    <button class="btn-google" id="google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Sign up with Google
    </button>

    <div class="divider">or</div>

    <div class="form-error" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>

    <form id="signup-form" novalidate>
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Jane Smith" autocomplete="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required minlength="8">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create account</button>
    </form>

    <p class="auth-divider" style="margin-top:16px;font-size:0.78rem;">
      By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
    </p>
    <p class="auth-divider">
      Already have an account? <a href="login.html">Log in</a>
    </p>
  </div>

  <p style="margin-top:20px;font-size:0.8rem;">
    <a href="landing.html" style="color:var(--text-muted)">← Back to home</a>
  </p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="auth.js"></script>
  <script>
    Auth.init().then(user => { if (user) window.location.href = 'index.html'; });

    const errorEl = document.getElementById('error-msg');
    const successEl = document.getElementById('success-msg');

    function showError(msg) {
      successEl.classList.remove('show');
      errorEl.textContent = msg;
      errorEl.classList.add('show');
    }

    function showSuccess(msg) {
      errorEl.classList.remove('show');
      successEl.textContent = msg;
      successEl.classList.add('show');
    }

    // Google
    document.getElementById('google-btn').addEventListener('click', async () => {
      const result = await Auth.signInWithGoogle();
      if (!result.ok) showError(result.error);
    });

    // Email + password
    document.getElementById('signup-form').addEventListener('submit', async e => {
      e.preventDefault();
      errorEl.classList.remove('show');
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!name || !email || !password) return showError('Please fill in all fields.');
      if (password.length < 8) return showError('Password must be at least 8 characters.');

      const btn = e.target.querySelector('button[type=submit]');
      btn.textContent = 'Creating account...';
      btn.disabled = true;

      const result = await Auth.signUp(name, email, password);
      if (result.ok) {
        // Supabase sends a confirmation email by default
        showSuccess('Account created! Check your email to confirm, then log in.');
        btn.textContent = 'Account created!';
      } else {
        showError(result.error);
        btn.textContent = 'Create account';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
